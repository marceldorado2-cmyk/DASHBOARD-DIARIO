<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Cadastro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    /* ── TELA DE LOGIN ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #1a73e8, #0d47a1);
    }
    .login-box {
      background: #fff; border-radius: 12px; padding: 40px 36px;
      width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
      text-align: center;
    }
    .login-box h2 { margin-bottom: 6px; color: #1a73e8; font-size: 1.6rem; }
    .login-box p.subtitle { color: #777; font-size: .9rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 14px; margin-bottom: 14px;
      border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem;
      transition: border .2s;
    }
    .login-box input:focus { outline: none; border-color: #1a73e8; }
    .login-box button {
      width: 100%; padding: 13px; background: #1a73e8; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
      transition: background .2s;
    }
    .login-box button:hover { background: #1558b0; }
    .login-box .msg { margin-top: 12px; font-size: .9rem; color: #e53935; min-height: 20px; }
    .login-box .register-link {
      margin-top: 18px; font-size: .88rem; color: #555;
    }
    .login-box .register-link a { color: #1a73e8; cursor: pointer; text-decoration: underline; }

    /* ── TELA DE CADASTRO ── */
    #registerScreen {
      display: none; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #1a73e8, #0d47a1);
    }
    .register-box {
      background: #fff; border-radius: 12px; padding: 40px 36px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
      text-align: center;
    }
    .register-box h2 { margin-bottom: 6px; color: #1a73e8; font-size: 1.5rem; }
    .register-box p.subtitle { color: #777; font-size: .9rem; margin-bottom: 22px; }
    .register-box input {
      width: 100%; padding: 12px 14px; margin-bottom: 12px;
      border: 1.5px solid #ddd; border-radius: 8px; font-size: .97rem;
      transition: border .2s;
    }
    .register-box input:focus { outline: none; border-color: #1a73e8; }
    .register-box button.btn-primary {
      width: 100%; padding: 13px; background: #1a73e8; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
      transition: background .2s;
    }
    .register-box button.btn-primary:hover { background: #1558b0; }
    .register-box .msg { margin-top: 12px; font-size: .9rem; min-height: 20px; }
    .register-box .back-link {
      margin-top: 16px; font-size: .88rem; color: #555;
    }
    .register-box .back-link a { color: #1a73e8; cursor: pointer; text-decoration: underline; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; min-height: 100vh; flex-direction: column; }

    header {
      background: #1a73e8; color: #fff; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; }
    header .user-info { font-size: .88rem; display: flex; align-items: center; gap: 14px; }
    header .user-info span { opacity: .9; }
    header .user-info button {
      background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.4);
      color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: .85rem; transition: background .2s;
    }
    header .user-info button:hover { background: rgba(255,255,255,.3); }

    nav.tabs {
      background: #fff; border-bottom: 2px solid #e0e0e0;
      display: flex; padding: 0 24px; gap: 4px;
    }
    nav.tabs button {
      padding: 14px 22px; border: none; background: none; cursor: pointer;
      font-size: .95rem; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color .2s, border-color .2s;
    }
    nav.tabs button.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
    nav.tabs button:hover:not(.active) { color: #333; }

    .tab-content { display: none; padding: 28px 28px; flex: 1; }
    .tab-content.active { display: block; }

    .card {
      background: #fff; border-radius: 10px; padding: 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 20px;
    }
    .card h3 { margin-bottom: 16px; color: #1a73e8; font-size: 1.1rem; }

    table { width: 100%; border-collapse: collapse; font-size: .93rem; }
    th { background: #f5f7fa; color: #555; font-weight: 600;
         padding: 11px 14px; text-align: left; border-bottom: 2px solid #e0e0e0; }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; color: #444; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: .78rem; font-weight: 600;
    }
    .badge-pending  { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d1e7dd; color: #155724; }

    .btn-approve {
      background: #198754; color: #fff; border: none;
      padding: 5px 14px; border-radius: 6px; cursor: pointer;
      font-size: .83rem; transition: background .2s;
    }
    .btn-approve:hover { background: #146c43; }
    .btn-del {
      background: #e53935; color: #fff; border: none;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: .83rem; margin-left: 6px; transition: background .2s;
    }
    .btn-del:hover { background: #b71c1c; }

    .empty-state {
      text-align: center; color: #aaa; padding: 40px 0; font-size: .95rem;
    }

    /* ── PERFIL ── */
    .profile-form input {
      width: 100%; padding: 11px 13px; margin-bottom: 13px;
      border: 1.5px solid #ddd; border-radius: 8px; font-size: .97rem;
    }
    .profile-form input:focus { outline: none; border-color: #1a73e8; }
    .profile-form button {
      padding: 11px 28px; background: #1a73e8; color: #fff;
      border: none; border-radius: 8px; font-size: .97rem; cursor: pointer;
    }
    .profile-form button:hover { background: #1558b0; }
    .profile-msg { margin-top: 10px; font-size: .9rem; color: #198754; }

    /* ── RESPONSIVO ── */
    @media (max-width: 600px) {
      .tab-content { padding: 16px; }
      nav.tabs button { padding: 12px 13px; font-size: .85rem; }
      header { padding: 0 14px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════
     TELA DE LOGIN
════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Bem-vindo</h2>
    <p class="subtitle">Acesse o sistema com seu e-mail</p>
    <input type="email" id="loginEmail" placeholder="Seu e-mail" />
    <input type="password" id="loginPassword" placeholder="Senha" />
    <button onclick="doLogin()">Entrar</button>
    <div class="msg" id="loginMsg"></div>
    <div class="register-link">
      Não tem conta? <a onclick="showRegister()">Cadastre-se</a>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     TELA DE CADASTRO
════════════════════════════════ -->
<div id="registerScreen">
  <div class="register-box">
    <h2>📝 Criar Conta</h2>
    <p class="subtitle">Preencha os dados abaixo</p>
    <input type="text"  id="regName"     placeholder="Nome completo" />
    <input type="email" id="regEmail"    placeholder="E-mail" />
    <input type="password" id="regPass"  placeholder="Senha" />
    <input type="password" id="regPass2" placeholder="Confirmar senha" />
    <button class="btn-primary" onclick="doRegister()">Cadastrar</button>
    <div class="msg" id="registerMsg"></div>
    <div class="back-link">
      Já tem conta? <a onclick="showLogin()">Voltar ao login</a>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     DASHBOARD
════════════════════════════════ -->
<div id="dashboard">
  <header>
    <span class="brand">🏢 Sistema</span>
    <div class="user-info">
      <span id="headerUserName"></span>
      <button onclick="doLogout()">Sair</button>
    </div>
  </header>

  <nav class="tabs" id="tabsNav">
    <button class="active" onclick="switchTab('home',this)">🏠 Início</button>
    <button onclick="switchTab('profile',this)">👤 Perfil</button>
    <!-- aba Aprovações só aparece para admin (injetada via JS) -->
  </nav>

  <!-- TAB: INÍCIO -->
  <div class="tab-content active" id="tab-home">
    <div class="card">
      <h3>Olá, <span id="welcomeName"></span>! 👋</h3>
      <p style="color:#555;line-height:1.6">
        Você está logado no sistema.<br>
        Use o menu acima para navegar.
      </p>
    </div>
  </div>

  <!-- TAB: PERFIL -->
  <div class="tab-content" id="tab-profile">
    <div class="card">
      <h3>Meu Perfil</h3>
      <div class="profile-form">
        <input type="text"  id="pfName"  placeholder="Nome" />
        <input type="email" id="pfEmail" placeholder="E-mail" readonly style="background:#f5f5f5" />
        <input type="password" id="pfPass" placeholder="Nova senha (deixe em branco para manter)" />
        <button onclick="saveProfile()">Salvar</button>
        <div class="profile-msg" id="profileMsg"></div>
      </div>
    </div>
  </div>

  <!-- TAB: APROVAÇÕES (admin) -->
  <div class="tab-content" id="tab-approvals">
    <div class="card">
      <h3>⏳ Cadastros Pendentes</h3>
      <div id="pendingTableWrap"></div>
    </div>
    <div class="card">
      <h3>✅ Usuários Aprovados</h3>
      <div id="approvedTableWrap"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     SCRIPT
════════════════════════════════ -->
<script>
  const ADMIN_EMAIL = 'marcel.dorado2@gmail.com';
  const LS_USERS    = 'sys_users';
  const LS_SESSION  = 'sys_session';

  /* ── helpers localStorage ── */
  function getUsers() {
    return JSON.parse(localStorage.getItem(LS_USERS) || '[]');
  }
  function saveUsers(u) {
    localStorage.setItem(LS_USERS, JSON.stringify(u));
  }
  function getSession() {
    return JSON.parse(localStorage.getItem(LS_SESSION) || 'null');
  }
  function saveSession(u) {
    localStorage.setItem(LS_SESSION, JSON.stringify(u));
  }

  /* ── navegação entre telas ── */
  function showLogin()    {
    document.getElementById('loginScreen').style.display    = 'flex';
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('dashboard').style.display      = 'none';
    document.getElementById('loginMsg').textContent = '';
  }
  function showRegister() {
    document.getElementById('loginScreen').style.display    = 'none';
    document.getElementById('registerScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display      = 'none';
    document.getElementById('registerMsg').textContent = '';
  }
  function showDashboard(user) {
    document.getElementById('loginScreen').style.display    = 'none';
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('dashboard').style.display      = 'flex';
    document.getElementById('headerUserName').textContent   = user.name;
    document.getElementById('welcomeName').textContent      = user.name;

    /* injeta aba Aprovações apenas para admin */
    const nav = document.getElementById('tabsNav');
    const existingAprov = document.getElementById('tabBtnApprovals');
    if (user.email === ADMIN_EMAIL) {
      if (!existingAprov) {
        const btn = document.createElement('button');
        btn.id        = 'tabBtnApprovals';
        btn.textContent = '✅ Aprovações';
        btn.onclick   = function(){ switchTab('approvals', this); };
        nav.appendChild(btn);
      }
    } else {
      if (existingAprov) existingAprov.remove();
    }

    /* preenche perfil */
    document.getElementById('pfName').value  = user.name;
    document.getElementById('pfEmail').value = user.email;
    document.getElementById('pfPass').value  = '';

    switchTab('home', nav.querySelector('button'));
  }

  /* ── tabs ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'approvals') renderApprovals();
  }

  /* ══════════════════════════════
     LOGIN
  ══════════════════════════════ */
  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass  = document.getElementById('loginPassword').value;
    const msg   = document.getElementById('loginMsg');

    if (!email) { msg.textContent = 'Informe o e-mail.'; return; }

    /* ── ADMIN: sem senha ── */
    if (email === ADMIN_EMAIL) {
      const adminUser = { name: 'Marcel (Admin)', email: ADMIN_EMAIL, role: 'admin' };
      saveSession(adminUser);
      msg.textContent = '';
      showDashboard(adminUser);
      return;
    }

    /* ── USUÁRIO COMUM ── */
    if (!pass) { msg.textContent = 'Informe a senha.'; return; }

    const users = getUsers();
    const user  = users.find(u => u.email === email);

    if (!user) { msg.textContent = 'E-mail não encontrado.'; return; }
    if (user.password !== pass) { msg.textContent = 'Senha incorreta.'; return; }
    if (user.status === 'pending') {
      msg.textContent = '⏳ Cadastro aguardando aprovação do administrador.'; return;
    }

    saveSession(user);
    msg.textContent = '';
    showDashboard(user);
  }

  /* ══════════════════════════════
     CADASTRO
  ══════════════════════════════ */
  function doRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim().toLowerCase();
    const pass  = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    const msg   = document.getElementById('registerMsg');

    msg.style.color = '#e53935';
    if (!name)           { msg.textContent = 'Informe seu nome.'; return; }
    if (!email)          { msg.textContent = 'Informe seu e-mail.'; return; }
    if (!pass)           { msg.textContent = 'Informe uma senha.'; return; }
    if (pass !== pass2)  { msg.textContent = 'As senhas não coincidem.'; return; }
    if (email === ADMIN_EMAIL) { msg.textContent = 'E-mail não permitido.'; return; }

    const users = getUsers();
    if (users.find(u => u.email === email)) {
      msg.textContent = 'E-mail já cadastrado.'; return;
    }

    users.push({ name, email, password: pass, status: 'pending', createdAt: new Date().toISOString() });
    saveUsers(users);

    msg.style.color  = '#198754';
    msg.textContent  = '✅ Cadastro enviado! Aguarde aprovação do administrador.';

    /* limpa campos */
    ['regName','regEmail','regPass','regPass2'].forEach(id =>
      document.getElementById(id).value = '');
  }

  /* ══════════════════════════════
     PERFIL
  ══════════════════════════════ */
  function saveProfile() {
    const session = getSession();
    const newName = document.getElementById('pfName').value.trim();
    const newPass = document.getElementById('pfPass').value;
    const msg     = document.getElementById('profileMsg');

    if (!newName) { msg.style.color='#e53935'; msg.textContent='Nome não pode ser vazio.'; return; }

    /* admin: só atualiza sessão (sem entrada no array de usuários) */
    if (session.email === ADMIN_EMAIL) {
      session.name = newName;
      saveSession(session);
      document.getElementById('headerUserName').textContent = newName;
      document.getElementById('welcomeName').textContent    = newName;
      msg.style.color = '#198754';
      msg.textContent = 'Perfil atualizado!';
      return;
    }

    const users = getUsers();
    const idx   = users.findIndex(u => u.email === session.email);
    if (idx === -1) return;
    users[idx].name = newName;
    if (newPass) users[idx].password = newPass;
    saveUsers(users);

    session.name = newName;
    saveSession(session);
    document.getElementById('headerUserName').textContent = newName;
    document.getElementById('welcomeName').textContent    = newName;
    msg.style.color = '#198754';
    msg.textContent = 'Perfil atualizado!';
  }

  /* ══════════════════════════════
     APROVAÇÕES
  ══════════════════════════════ */
  function renderApprovals() {
    const users    = getUsers();
    const pending  = users.filter(u => u.status === 'pending');
    const approved = users.filter(u => u.status === 'approved');

    document.getElementById('pendingTableWrap').innerHTML  = buildTable(pending,  true);
    document.getElementById('approvedTableWrap').innerHTML = buildTable(approved, false);
  }

  function buildTable(list, isPending) {
    if (!list.length) return '<div class="empty-state">Nenhum registro encontrado.</div>';

    let html = `<table>
      <thead><tr>
        <th>Nome</th><th>E-mail</th><th>Data</th><th>Status</th><th>Ações</th>
      </tr></thead><tbody>`;

    list.forEach(u => {
      const date = u.createdAt
        ? new Date(u.createdAt).toLocaleDateString('pt-BR')
        : '—';
      const badge = isPending
        ? '<span class="badge badge-pending">Pendente</span>'
        : '<span class="badge badge-approved">Aprovado</span>';
      const actions = isPending
        ? `<button class="btn-approve" onclick="approveUser('${u.email}')">Aprovar</button>
           <button class="btn-del"     onclick="deleteUser('${u.email}')">Excluir</button>`
        : `<button class="btn-del"     onclick="deleteUser('${u.email}')">Excluir</button>`;

      html += `<tr>
        <td>${u.name}</td><td>${u.email}</td>
        <td>${date}</td><td>${badge}</td><td>${actions}</td>
      </tr>`;
    });

    return html + '</tbody></table>';
  }

  function approveUser(email) {
    const users = getUsers();
    const idx   = users.findIndex(u => u.email === email);
    if (idx !== -1) { users[idx].status = 'approved'; saveUsers(users); }
    renderApprovals();
  }

  function deleteUser(email) {
    if (!confirm('Excluir este usuário?')) return;
    saveUsers(getUsers().filter(u => u.email !== email));
    renderApprovals();
  }

  /* ══════════════════════════════
     LOGOUT
  ══════════════════════════════ */
  function doLogout() {
    localStorage.removeItem(LS_SESSION);
    showLogin();
  }

  /* ══════════════════════════════
     INICIALIZAÇÃO
  ══════════════════════════════ */
  (function init() {
    const session = getSession();
    if (session) {
      /* verifica se usuário comum ainda está aprovado */
      if (session.email !== ADMIN_EMAIL) {
        const users = getUsers();
        const user  = users.find(u => u.email === session.email);
        if (!user || user.status !== 'approved') {
          localStorage.removeItem(LS_SESSION);
          showLogin(); return;
        }
      }
      showDashboard(session);
    } else {
      showLogin();
    }

    /* ── link de aprovação via URL: ?approve=email ── */
    const params     = new URLSearchParams(window.location.search);
    const approveEmail = params.get('approve');
    if (approveEmail) {
      const users = getUsers();
      const idx   = users.findIndex(u => u.email === approveEmail);
      if (idx !== -1 && users[idx].status === 'pending') {
        users[idx].status = 'approved';
        saveUsers(users);
        alert('✅ Usuário ' + users[idx].name + ' aprovado com sucesso!');
      }
      /* remove o parâmetro da URL */
      window.history.replaceState({}, '', window.location.pathname);
    }
  })();
</script>
</body>
</html>
