<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel de Atendimentos</title>
  <style>
    body {
      background: #181a25;
      color: #fff;
      font-family: 'Inter', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      padding: 32px;
      max-width: 800px;
      margin: auto;
    }
    .filters-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }
    .filters-row label { margin-right: 6px; }
    .range-row input[type="date"], .filters-row select {
      background: #272848;
      color: #fff;
      border: 1.5px solid #3d4586;
      border-radius: 7px;
      padding: 10px 15px;
      font-size: 1rem;
      outline: none;
      min-width: 150px;
    }
    .range-row .btn, .filters-row .btn {
      background: #3d4586;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px 17px;
      margin-right: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
    }
    .range-row .btn:hover, .filters-row .btn:hover {
      background: #5963c7;
    }
    .range-row .sep {
      margin: 0 6px 0 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Painel de Atendimentos</h1>
    <p>Fonte: <strong>dados.csv</strong></p>

    <!-- Período -->
    <div class="range-row filters-row">
      <label for="dateStart">PERÍODO</label>
      <input id="dateStart" type="date" />
      <span class="sep">a</span>
      <input id="dateEnd" type="date" />
      <button class="btn" id="btnHoje" type="button">Hoje</button>
      <button class="btn" id="btn30" type="button">30 dias</button>
      <button class="btn" id="btnLimparPeriodo" type="button">Limpar</button>
    </div>

    <!-- Filtros extras (exemplo: STATUS e UF) -->
    <div class="filters-row">
      <label for="statusSel">Status</label>
      <select id="statusSel">
        <option value="">Todos</option>
        <option value="aberto">Aberto</option>
        <option value="fechado">Fechado</option>
        <option value="andamento">Em andamento</option>
      </select>

      <label for="ufSel">UF</label>
      <select id="ufSel">
        <option value="">Todos</option>
        <option value="SP">SP</option>
        <option value="RJ">RJ</option>
        <option value="MG">MG</option>
        <!-- Adapte conforme seus estados -->
      </select>

      <button class="btn" id="btnResetFiltros" type="button">Resetar tudo</button>
    </div>

    <div id="app"></div>
  </div>
  <script>
    function el(id) { return document.getElementById(id); }
    function fmtISODateLocal(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function parseDateOnlyInput(str) {
      if (!str) return null;
      if (str.match(/^\d{4}-\d{2}-\d{2}$/)) {
        const [y, m, d] = str.split("-");
        return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
      }
      // Adapte se você usar outro formato
      return null;
    }

    // SOBRE O ESTADO DOS FILTROS
    function getFiltros() {
      return {
        periodStart: parseDateOnlyInput(el("dateStart").value),
        periodEnd: parseDateOnlyInput(el("dateEnd").value),
        status: el("statusSel").value,
        uf: el("ufSel").value
      };
    }

    // Handlers dos botões do período
    el("btnLimparPeriodo").addEventListener("click", () => {
      el("dateStart").value = "";
      el("dateEnd").value = "";
      updateAll();
    });
    el("btnHoje").addEventListener("click", () => {
      const now = new Date();
      const s = fmtISODateLocal(now);
      el("dateStart").value = s;
      el("dateEnd").value = s;
      updateAll();
    });
    el("btn30").addEventListener("click", () => {
      const now = new Date();
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const start = new Date(end);
      start.setDate(start.getDate() - 29);
      el("dateStart").value = fmtISODateLocal(start);
      el("dateEnd").value = fmtISODateLocal(end);
      updateAll();
    });

    // Mudança dos filtros de período chama updateAll
    el("dateStart").addEventListener("change", () => updateAll());
    el("dateEnd").addEventListener("change", () => updateAll());
    // Mudança dos selects chama updateAll
    el("statusSel").addEventListener("change", () => updateAll());
    el("ufSel").addEventListener("change", () => updateAll());

    // Botão de reset geral dos filtros
    el("btnResetFiltros").addEventListener("click", () => {
      el("dateStart").value = "";
      el("dateEnd").value = "";
      el("statusSel").value = "";
      el("ufSel").value = "";
      updateAll();
    });

    // SUA FUNÇÃO CENTRAL DE ATUALIZAÇÃO
    function updateAll() {
      const filtros = getFiltros();
      // Aqui você faz:
      // - Carregamento/Filtragem do CSV (ou pode ser só filtragem se já carregou antes)
      // - Atualização de resultados/panéis/gráficos

      // Aqui vai só um exemplo visual:
      el("app").innerHTML = `
        <p>
          Período: 
          <strong>${filtros.periodStart ? filtros.periodStart.toLocaleDateString() : 'não definido'}</strong>
          a
          <strong>${filtros.periodEnd ? filtros.periodEnd.toLocaleDateString() : 'não definido'}</strong><br>
          Status: <strong>${filtros.status || 'qualquer'}</strong> <br>
          UF: <strong>${filtros.uf || 'qualquer'}</strong>
        </p>
        <hr>
        <p>
          Aqui você mostra/filtra seus cards, tabelas ou gráficos usando os filtros acima 😉
        </p>
      `;
    }

    // Inicializa vazio ou como preferir
    updateAll();
  </script>
</body>
</html>
